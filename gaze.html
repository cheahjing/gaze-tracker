<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean WebGazer Setup</title>
  
  <script src="https://unpkg.com/webgazer@2.0.1/dist/webgazer.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #87CEEB; /* Ocean Blue */
      font-family: sans-serif;
    }

    /* Screen Containers */
    #start-screen, #calibration-screen, #tracking-screen {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #start-screen { background: rgba(0, 0, 0, 0.8); color: white; z-index: 100; }
    #calibration-screen { display: none; z-index: 50; }
    #tracking-screen { display: none; background: white; z-index: 40; }

    button {
      padding: 15px 30px;
      font-size: 20px;
      background-color: #00cc66;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background-color: #00aa55; }

    /* Fish Game CSS */
    .fish {
      position: absolute;
      width: 60px; height: 60px;
      font-size: 40px;
      display: flex; align-items: center; justify-content: center;
      transform: translate(-50%, -50%);
      cursor: pointer;
      user-select: none;
    }
    .blue-fish { background: transparent; }
    .red-fish { 
      background: rgba(255, 0, 0, 0.3); 
      border-radius: 50%; 
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 51, 85, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(255, 51, 85, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 51, 85, 0); }
    }

    #status-text {
      font-size: 50px;
      font-weight: bold;
    }

    /* THE FIX: Aggressively force all WebGazer elements to the absolute front */
    #webgazerVideoContainer, #webgazerVideoFeed, #webgazerVideoCanvas, #webgazerFaceOverlay, #webgazerFaceFeedbackBox {
      z-index: 99999 !important;
      position: fixed !important;
      display: block !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h2>Eye Tracking Setup</h2>
    <p>Click start, allow the camera, and wait for your face to appear in the top left.</p>
    <button id="start-btn">Start Camera</button>
    <p id="loading-text" style="display:none; color: yellow;">Starting camera... please wait.</p>
  </div>

  <div id="calibration-screen">
    <h2 style="position: absolute; top: 20px; color: white;">Catch the RED fish!</h2>
  </div>

  <div id="tracking-screen">
    <div id="status-text">Waiting for gaze...</div>
  </div>

  <script>
    let calibrationPoints = [
      {x: 15, y: 15}, {x: 50, y: 15}, {x: 85, y: 15},
      {x: 15, y: 50}, {x: 50, y: 50}, {x: 85, y: 50},
      {x: 15, y: 85}, {x: 50, y: 85}, {x: 85, y: 85}
    ];
    let remainingPoints = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    let currentTarget = -1;

    const startBtn = document.getElementById("start-btn");
    const loadingText = document.getElementById("loading-text");
    const startScreen = document.getElementById("start-screen");
    const calibScreen = document.getElementById("calibration-screen");
    const trackingScreen = document.getElementById("tracking-screen");
    const statusText = document.getElementById("status-text");

    startBtn.addEventListener("click", async () => {
          startBtn.style.display = "none";
          loadingText.style.display = "block";
    
          webgazer.clearData();
    
          // Start WebGazer
          await webgazer.begin();
          webgazer.showVideo(true).showPredictionPoints(true);
    
          // THE ENFORCER: Force the video to the front every 500ms
          setInterval(() => {
            const wgContainer = document.getElementById("webgazerVideoContainer");
            const wgCanvas = document.getElementById("webgazerVideoCanvas");
            const wgFace = document.getElementById("webgazerFaceOverlay");
            
            if (wgContainer) {
              wgContainer.style.position = "fixed";
              wgContainer.style.top = "0px";
              wgContainer.style.left = "0px";
              wgContainer.style.zIndex = "999999";
              wgContainer.style.display = "block";
              wgContainer.style.opacity = "1";
            }
            if (wgCanvas) wgCanvas.style.zIndex = "999999";
            if (wgFace) wgFace.style.zIndex = "999999";
          }, 500);
    
          // Wait 4 seconds to ensure the camera UI loads on top before starting
          setTimeout(() => {
            startScreen.style.display = "none";
            startCalibration();
          }, 4000);
        });

    function startCalibration() {
      calibScreen.style.display = "block";
      remainingPoints.sort(() => Math.random() - 0.5);

      calibrationPoints.forEach((pos, index) => {
        const fish = document.createElement("div");
        fish.id = `fish-${index}`;
        fish.className = "fish blue-fish";
        fish.innerText = "🔵🐟";
        fish.style.left = pos.x + "%";
        fish.style.top = pos.y + "%";
        
        fish.onclick = () => onFishClick(index);
        calibScreen.appendChild(fish);
      });

      activateNextFish();
    }

    function activateNextFish() {
      if (remainingPoints.length === 0) {
        calibScreen.style.display = "none";
        startTrackingActivity();
        return;
      }

      currentTarget = remainingPoints.pop();
      const targetFish = document.getElementById(`fish-${currentTarget}`);
      targetFish.className = "fish red-fish";
      targetFish.innerText = "🔴🐠";
    }

    function onFishClick(clickedIndex) {
      if (clickedIndex === currentTarget) {
        const caughtFish = document.getElementById(`fish-${clickedIndex}`);
        caughtFish.style.display = "none"; 
        activateNextFish();
      }
    }

    function startTrackingActivity() {
      trackingScreen.style.display = "flex";
      webgazer.showPredictionPoints(false);

      webgazer.setGazeListener((data, elapsedTime) => {
        if (data == null) {
          updateStatus(false);
          return;
        }

        const x = data.x;
        const y = data.y;

        const isInsideX = (x >= 0 && x <= window.innerWidth);
        const isInsideY = (y >= 0 && y <= window.innerHeight);

        if (isInsideX && isInsideY) {
          updateStatus(true);
        } else {
          updateStatus(false); 
        }
      });
    }

    function updateStatus(isOnScreen) {
      if (isOnScreen) {
        statusText.innerText = "👀 Looking at Screen!";
        statusText.style.color = "green";
        trackingScreen.style.backgroundColor = "#e6ffe6"; 
      } else {
        statusText.innerText = "🙈 Looking AWAY!";
        statusText.style.color = "red";
        trackingScreen.style.backgroundColor = "#ffe6e6"; 
      }
    }
  </script>
</body>
</html>
