<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean WebGazer Setup</title>
  
  <script src="https://unpkg.com/webgazer@2.0.1/dist/webgazer.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #87CEEB; /* Ocean Blue */
      font-family: sans-serif;
    }

    /* Screen Containers */
    #start-screen, #calibration-screen, #tracking-screen {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #start-screen { background: rgba(0, 0, 0, 0.8); color: white; z-index: 100; }
    #calibration-screen { display: none; z-index: 50; }
    #tracking-screen { display: none; background: white; z-index: 40; }

    button {
      padding: 15px 30px;
      font-size: 20px;
      background-color: #00cc66;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background-color: #00aa55; }

    /* Fish Game CSS */
    .fish {
      position: absolute;
      width: 60px; height: 60px;
      font-size: 40px;
      display: flex; align-items: center; justify-content: center;
      transform: translate(-50%, -50%);
      cursor: pointer;
      user-select: none;
    }
    .blue-fish { background: transparent; }
    .red-fish { 
      background: rgba(255, 0, 0, 0.3); 
      border-radius: 50%; 
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 51, 85, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(255, 51, 85, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 51, 85, 0); }
    }

    /* Tracking Status Text */
    #status-text {
      font-size: 50px;
      font-weight: bold;
    }

    /* Force WebGazer elements to be visible */
    #webgazerVideoFeed, #webgazerVideoCanvas, #webgazerFaceOverlay, #webgazerFaceFeedbackBox {
      z-index: 9999 !important;
      display: block !important;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h2>Eye Tracking Setup</h2>
    <p>Click start, allow the camera, and wait for your face to appear.</p>
    <button id="start-btn">Start Camera</button>
    <p id="loading-text" style="display:none; color: yellow;">Starting camera... please wait.</p>
  </div>

  <div id="calibration-screen">
    <h2 style="position: absolute; top: 20px; color: white;">Catch the RED fish!</h2>
    </div>

  <div id="tracking-screen">
    <div id="status-text">Waiting for gaze...</div>
  </div>

  <script>
    // --- State Variables ---
    let calibrationPoints = [
      {x: 15, y: 15}, {x: 50, y: 15}, {x: 85, y: 15},
      {x: 15, y: 50}, {x: 50, y: 50}, {x: 85, y: 50},
      {x: 15, y: 85}, {x: 50, y: 85}, {x: 85, y: 85}
    ];
    let remainingPoints = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    let currentTarget = -1;

    // --- DOM Elements ---
    const startBtn = document.getElementById("start-btn");
    const loadingText = document.getElementById("loading-text");
    const startScreen = document.getElementById("start-screen");
    const calibScreen = document.getElementById("calibration-screen");
    const trackingScreen = document.getElementById("tracking-screen");
    const statusText = document.getElementById("status-text");

    // --- 1. Start WebGazer ---
    startBtn.addEventListener("click", async () => {
      startBtn.style.display = "none";
      loadingText.style.display = "block";

      // Clear old data just in case
      webgazer.clearData();

      // Begin WebGazer (This triggers the browser permission popup)
      await webgazer.begin();
      
      // Show the camera feed and the guessing dot
      webgazer.showVideo(true).showPredictionPoints(true);

      // Give the camera 3 seconds to fully render and find the face before showing fish
      setTimeout(() => {
        startScreen.style.display = "none";
        startCalibration();
      }, 3000);
    });

    // --- 2. Calibration Game ---
    function startCalibration() {
      calibScreen.style.display = "block";
      
      // Shuffle the order of the fish
      remainingPoints.sort(() => Math.random() - 0.5);

      // Draw all 9 fish on the screen
      calibrationPoints.forEach((pos, index) => {
        const fish = document.createElement("div");
        fish.id = `fish-${index}`;
        fish.className = "fish blue-fish";
        fish.innerText = "🔵🐟";
        fish.style.left = pos.x + "%";
        fish.style.top = pos.y + "%";
        
        fish.onclick = () => onFishClick(index);
        calibScreen.appendChild(fish);
      });

      activateNextFish();
    }

    function activateNextFish() {
      // If no points left, we are done calibrating!
      if (remainingPoints.length === 0) {
        calibScreen.style.display = "none";
        startTrackingActivity();
        return;
      }

      // Pick the next fish to turn red
      currentTarget = remainingPoints.pop();
      const targetFish = document.getElementById(`fish-${currentTarget}`);
      targetFish.className = "fish red-fish";
      targetFish.innerText = "🔴🐠";
    }

    function onFishClick(clickedIndex) {
      // Only do something if they clicked the exact RED fish
      if (clickedIndex === currentTarget) {
        const caughtFish = document.getElementById(`fish-${clickedIndex}`);
        caughtFish.style.display = "none"; // Hide the caught fish
        
        // WebGazer automatically learns from this click in the background
        activateNextFish();
      }
    }

    // --- 3. Main Tracking Activity ---
    function startTrackingActivity() {
      trackingScreen.style.display = "flex";
      
      // We can hide the guessing dot now so it isn't distracting
      webgazer.showPredictionPoints(false);

      // Setup a listener that fires constantly with the user's eye coordinates
      webgazer.setGazeListener((data, elapsedTime) => {
        if (data == null) {
          // If data is null, the AI has lost the face entirely
          updateStatus(false);
          return;
        }

        const x = data.x;
        const y = data.y;

        // Check if coordinates are inside the browser window
        const isInsideX = (x >= 0 && x <= window.innerWidth);
        const isInsideY = (y >= 0 && y <= window.innerHeight);

        if (isInsideX && isInsideY) {
          updateStatus(true); // On Screen
        } else {
          updateStatus(false); // Off Screen
        }
      });
    }

    // Update the visual text based on gaze
    function updateStatus(isOnScreen) {
      if (isOnScreen) {
        statusText.innerText = "👀 Looking at Screen!";
        statusText.style.color = "green";
        trackingScreen.style.backgroundColor = "#e6ffe6"; // Light green background
      } else {
        statusText.innerText = "🙈 Looking AWAY!";
        statusText.style.color = "red";
        trackingScreen.style.backgroundColor = "#ffe6e6"; // Light red background
      }
    }
  </script>
</body>
</html>
