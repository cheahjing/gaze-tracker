<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto Looking Logger - Local Edition</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: system-ui;
      overflow: hidden;
    }

    #layout {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #videoPane {
      flex: 1;
      position: relative;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      text-align: center;
    }

    button {
      font-size: 18px;
      padding: 10px 18px;
      margin-top: 10px;
      cursor: pointer;
    }

    /* Manual Download Button (Appears at end) */
    #downloadBtn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: #00cc66;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      display: none; 
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #downloadBtn:hover { background: #00aa55; }

    /* Stop Button (Appears during playback) */
    #stopBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #ff3355;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      display: none; 
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #stopBtn:hover { background: #dd2244; }

    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      font-size: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      z-index: 900;
      max-width: 320px;
    }

    #debugPane {
      width: 320px;
      background: #111;
      padding: 12px;
      display: none;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #camWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      overflow: hidden;
      margin-bottom: 12px;
    }

    #camVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: block;
      transform: scaleX(-1);
    }

    #camCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform: scaleX(-1);
    }

    .kv {
      margin: 4px 0;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div id="layout">
    <div id="videoPane">
      <div id="player"></div>

      <div id="overlay">
        <div>
          <h2>Auto Looking Logger</h2>
          <p>
            Tap Start to begin video playback and automatic sampling.
          </p>
          <button id="startBtn">Start</button>
        </div>
      </div>

      <button id="stopBtn">⏹ Stop & Save</button>
      <button id="downloadBtn">📥 Download Data (CSV)</button>

      <div id="debug">Loading...</div>
    </div>

    <div id="debugPane">
      <h3 style="margin-top:0;">Debug Camera View</h3>

      <div id="camWrap">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="camCanvas"></canvas>
      </div>

      <div class="kv" id="dbgCam">CAMERA: —</div>
      <div class="kv" id="dbgFace">FACE: —</div>
      <div class="kv" id="dbgCentered">CENTERED: —</div>
      <div class="kv" id="dbgCount">FACE COUNT: —</div>
      <div class="kv" id="dbgSize">FACE SIZE: —</div>
      <div class="kv" id="dbgConf">CONFIDENCE: —</div>
      <div class="kv" id="dbgState">AUTO STATE: —</div>
      <div class="kv" id="dbgTime">VIDEO TIME: —</div>
      <div class="kv" id="dbgPost">SAVE STATUS: —</div>
    </div>
  </div>

  <script type="module">
    import {
      FaceDetector,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

    /************************************************************
    URL PARAMETERS
    Required: ?pid=P001&vid=V01&yt=YOUTUBE_ID
    Optional: &debug=1
    ************************************************************/
    const params = new URLSearchParams(location.search);

    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YOUTUBE_ID = params.get("yt") || "";
    const DEBUG = params.get("debug") === "1";

    /************************************************************
    SESSION / STATE
    ************************************************************/
    const SESSION_ID = "auto_sess_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    let player = null;
    let started = false;
    let sessionEnded = false;
    let eventIndex = 0;

    // Local CSV Storage
    let csvData = [];
    const CSV_HEADERS = [
      "timestamp", "session_id", "participant_id", "video_id", "youtube_id", 
      "event_index", "video_time", "engaged", "key", "face_detected", 
      "face_centered", "face_count", "face_width", "face_height", "detection_confidence"
    ];

    let sampleTimer = null;
    let cameraReady = false;
    let detectorReady = false;
    let faceDetector = null;
    let detectionLoopRunning = false;

    let faceState = {
      face_detected: 0,
      face_centered: 0,
      face_count: 0,
      face_width: 0,
      face_height: 0,
      detection_confidence: 0,
      engaged: 0
    };

    // DOM Elements
    const debug = document.getElementById("debug");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const debugPane = document.getElementById("debugPane");

    const camVideo = document.getElementById("camVideo");
    const camCanvas = document.getElementById("camCanvas");
    const camCtx = camCanvas.getContext("2d");

    const dbgCam = document.getElementById("dbgCam");
    const dbgFace = document.getElementById("dbgFace");
    const dbgCentered = document.getElementById("dbgCentered");
    const dbgCount = document.getElementById("dbgCount");
    const dbgSize = document.getElementById("dbgSize");
    const dbgConf = document.getElementById("dbgConf");
    const dbgState = document.getElementById("dbgState");
    const dbgTime = document.getElementById("dbgTime");
    const dbgPost = document.getElementById("dbgPost");

    if (DEBUG) debugPane.style.display = "block";

    await init();

    /************************************************************
    INIT
    ************************************************************/
    async function init() {
      if (!YOUTUBE_ID) {
        debug.textContent =
          `❌ Missing YouTube ID in URL\n` +
          `Expected ?pid=P001&vid=V01&yt=YOUTUBE_ID`;
        return;
      }

      try {
        debug.textContent = "Initializing MediaPipe...";
        await initFaceDetector();

        debug.textContent = "Initializing YouTube player...";
        initPlayer(YOUTUBE_ID);

        debug.textContent =
          `Ready\n` +
          `Participant: ${PID}\n` +
          `Video: ${VID}\n` +
          `YouTube ID: ${YOUTUBE_ID}\n` +
          `Session: ${SESSION_ID}\n` +
          `Debug: ${DEBUG ? "ON" : "OFF"}\n` +
          `Tap Start`;
      } catch (err) {
        debug.textContent =
          `❌ Init failed\n` +
          `${err && err.message ? err.message : String(err)}`;
      }
    }

    /************************************************************
    INITIALIZE MEDIAPIPE FACE DETECTOR
    ************************************************************/
    async function initFaceDetector() {
      const filesetResolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
      );

      faceDetector = await FaceDetector.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite"
        },
        runningMode: "VIDEO",
        minDetectionConfidence: 0.5
      });

      detectorReady = true;
    }

    /************************************************************
    CREATE YOUTUBE PLAYER
    ************************************************************/
    function initPlayer(youtubeId) {
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);

      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player("player", {
          videoId: youtubeId,
          playerVars: {
            controls: 0,
            rel: 0,
            modestbranding: 1,
            playsinline: 1
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange
          }
        });
      };
    }

    function onPlayerReady() {
      debug.textContent =
        `Ready\n` +
        `Participant: ${PID}\n` +
        `Video: ${VID}\n` +
        `Session: ${SESSION_ID}\n` +
        `Tap Start`;
    }

    /************************************************************
    START CAMERA
    ************************************************************/
    async function startCamera() {
      if (cameraReady) return;

      dbgCam.textContent = "CAMERA: requesting permission...";

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      camVideo.srcObject = stream;
      await camVideo.play();
      await waitForCameraReady();

      cameraReady = true;
      dbgCam.textContent = `CAMERA: ready (${camVideo.videoWidth}×${camVideo.videoHeight})`;
    }

    function waitForCameraReady() {
      return new Promise((resolve, reject) => {
        const timeoutMs = 5000;
        const start = Date.now();

        function check() {
          if (camVideo.videoWidth > 0 && camVideo.videoHeight > 0) {
            resizeDebugCanvas();
            resolve();
            return;
          }

          if (Date.now() - start > timeoutMs) {
            reject(new Error("Camera video did not become ready in time."));
            return;
          }

          requestAnimationFrame(check);
        }

        check();
      });
    }

    function resizeDebugCanvas() {
      if (!DEBUG) return;
      camCanvas.width = camVideo.clientWidth || 320;
      camCanvas.height = camVideo.clientHeight || 240;
    }

    window.addEventListener("resize", resizeDebugCanvas);

    /************************************************************
    START SESSION
    ************************************************************/
    startBtn.addEventListener("click", startSession);

    async function startSession() {
      if (!player || started) return;

      try {
        overlay.style.display = "none";
        await startCamera();

        if (!detectorReady) {
          throw new Error("Face detector not ready.");
        }

        player.seekTo(0, true);
        player.playVideo();

        started = true;
        sessionEnded = false;
        
        // Show the Stop Button
        stopBtn.style.display = "block";

        startDetectionLoop();
        logAutoEvent("AUTO_START");

        sampleTimer = setInterval(() => {
          if (!started || sessionEnded) return;
          
          // Only log a sample if the video is currently PLAYING
          if (player && player.getPlayerState() !== YT.PlayerState.PLAYING) {
            return; 
          }
          
          logAutoEvent("AUTO_SAMPLE");
        }, 1000);

      } catch (err) {
        debug.textContent =
          `❌ Could not start session\n` +
          `Participant: ${PID}\n` +
          `Error: ${err && err.message ? err.message : String(err)}`;

        overlay.style.display = "flex";
      }
    }

    /************************************************************
    PLAYER STATE CHANGE & TERMINATE
    ************************************************************/
    function onPlayerStateChange(event) {
      if (started && !sessionEnded && event.data === YT.PlayerState.ENDED) {
        sessionEnded = true;
        clearInterval(sampleTimer);
        
        stopBtn.style.display = "none"; // Hide Stop Button
        downloadBtn.style.display = "block"; // Show Manual Download Button
        
        logAutoEvent("SESSION_COMPLETE");
        downloadCSV(); // Auto download
      }
    }

    function terminateSession() {
      if (!started || sessionEnded) return;

      sessionEnded = true;
      clearInterval(sampleTimer);

      if (player && player.pauseVideo) {
        player.pauseVideo();
      }

      stopBtn.style.display = "none"; // Hide Stop Button
      downloadBtn.style.display = "block"; // Show Manual Download Button
      
      logAutoEvent("SESSION_ABORT");
      downloadCSV(); // Auto download
    }

    // Stop Button Listener
    stopBtn.addEventListener("click", () => {
      terminateSession();
    });

    /************************************************************
    LOG AUTO EVENT (LOCAL ARRAY)
    ************************************************************/
    function logAutoEvent(key) {
      const t = player && player.getCurrentTime ? player.getCurrentTime() : 0;
      updateDebug(t, key);

      // Add headers on first run
      if (csvData.length === 0) {
        csvData.push(CSV_HEADERS);
      }

      // Create row
      const row = [
        new Date().toISOString(),
        SESSION_ID,
        PID,
        VID,
        YOUTUBE_ID,
        eventIndex++,
        Number(t.toFixed(3)),
        faceState.engaged,
        key,
        faceState.face_detected,
        faceState.face_centered,
        faceState.face_count,
        faceState.face_width,
        faceState.face_height,
        faceState.detection_confidence
      ];

      csvData.push(row);
      dbgPost.textContent = `SAVE STATUS: ${csvData.length - 1} rows saved locally.`;
    }

    /************************************************************
    DOWNLOAD CSV FILE
    ************************************************************/
    function downloadCSV() {
      if (csvData.length <= 1) return; // Don't download empty data

      const csvString = csvData.map(row => row.join(",")).join("\n");
      const blob = new Blob([csvString], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.setAttribute("href", url);
      
      // Saved format: pid_vid_sessionid.csv
      link.setAttribute("download", `${PID}_${VID}_${SESSION_ID}.csv`);
      
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      dbgPost.textContent = "SAVE STATUS: CSV DOWNLOADED!";
    }

    // Manual Download Button Listener
    downloadBtn.addEventListener("click", () => {
      downloadCSV();
    });

    /************************************************************
    UPDATE DEBUG PANELS
    ************************************************************/
    function updateDebug(videoTime, key) {
      debug.textContent =
        `Participant: ${PID}\n` +
        `Video: ${VID}\n` +
        `video_time: ${videoTime.toFixed(2)}\n` +
        `engaged: ${faceState.engaged}\n` +
        `key: ${key}`;

      if (DEBUG) {
        dbgFace.textContent = `FACE: ${faceState.face_detected ? "YES" : "NO"}`;
        dbgCentered.textContent = `CENTERED: ${faceState.face_centered ? "YES" : "NO"}`;
        dbgCount.textContent = `FACE COUNT: ${faceState.face_count}`;
        dbgSize.textContent = `FACE SIZE: ${faceState.face_width} × ${faceState.face_height}`;
        dbgConf.textContent = `CONFIDENCE: ${faceState.detection_confidence}`;
        dbgState.textContent = `AUTO STATE: ${faceState.engaged}`;
        dbgTime.textContent = `VIDEO TIME: ${videoTime.toFixed(2)}s`;
      }
    }

    /************************************************************
    MEDIAPIPE DETECTION LOOP
    ************************************************************/
    function startDetectionLoop() {
      if (detectionLoopRunning) return;
      detectionLoopRunning = true;

      function detectLoop() {
        if (!detectionLoopRunning || !detectorReady || !cameraReady) {
          requestAnimationFrame(detectLoop);
          return;
        }

        if (camVideo.readyState < 2 || camVideo.videoWidth === 0 || camVideo.videoHeight === 0) {
          requestAnimationFrame(detectLoop);
          return;
        }

        const timestamp = performance.now();
        const result = faceDetector.detectForVideo(camVideo, timestamp);
        const detections = result?.detections || [];

        if (DEBUG) {
          resizeDebugCanvas();
          camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
        }

        if (detections.length === 0) {
          faceState = {
            face_detected: 0,
            face_centered: 0,
            face_count: 0,
            face_width: 0,
            face_height: 0,
            detection_confidence: 0,
            engaged: 0
          };
          requestAnimationFrame(detectLoop);
          return;
        }

        const detection = detections[0];
        const box = detection.boundingBox;
        const score = detection.categories && detection.categories[0]
          ? detection.categories[0].score
          : 0;

        const vidW = camVideo.videoWidth;
        const vidH = camVideo.videoHeight;

        const faceCx = box.originX + box.width / 2;
        const faceCy = box.originY + box.height / 2;

        const margin = 0.15;
        const centered =
          faceCx > vidW * margin &&
          faceCx < vidW * (1 - margin) &&
          faceCy > vidH * margin &&
          faceCy < vidH * (1 - margin);

        // Calculate strict engagement
        const MIN_CONFIDENCE = 0.65;
        const isConfident = score >= MIN_CONFIDENCE;
        const isEngaged = centered && isConfident;

        faceState = {
          face_detected: 1,
          face_centered: centered ? 1 : 0,
          face_count: detections.length,
          face_width: Math.round(box.width),
          face_height: Math.round(box.height),
          detection_confidence: Number(score.toFixed(3)),
          engaged: isEngaged ? 1 : 0 
        };

        if (DEBUG) {
          const scaleX = camCanvas.width / vidW;
          const scaleY = camCanvas.height / vidH;

          camCtx.strokeStyle = centered ? "#00ff88" : "#ff3355";
          camCtx.lineWidth = 2;
          camCtx.strokeRect(
            box.originX * scaleX,
            box.originY * scaleY,
            box.width * scaleX,
            box.height * scaleY
          );
        }

        requestAnimationFrame(detectLoop);
      }

      requestAnimationFrame(detectLoop);
    }

    /************************************************************
    KEYBOARD LISTENER (ESC TO ABORT) - Kept as a fallback
    ************************************************************/
    document.addEventListener("keydown", (e) => {
      if (e.code === "Escape") {
        e.preventDefault();
        terminateSession();
      }
    });
  </script>
</body>
</html>
