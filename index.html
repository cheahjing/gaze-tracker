<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto Looking Logger</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: system-ui;
      overflow: hidden;
    }

    #layout {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #videoPane {
      flex: 1;
      position: relative;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      text-align: center;
    }

    button {
      font-size: 18px;
      padding: 10px 18px;
      margin-top: 10px;
    }

    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      font-size: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #debugPane {
      width: 320px;
      background: #111;
      padding: 12px;
      display: none;
    }

    #camVideo {
      width: 100%;
      transform: scaleX(-1);
    }

    #camCanvas {
      position: absolute;
      inset: 0;
      transform: scaleX(-1);
    }
  </style>
</head>

<body>
  <div id="layout">

    <div id="videoPane">
      <div id="player"></div>

      <div id="overlay">
        <div>
          <h2>Auto Looking Logger</h2>
          <button id="startBtn">Start</button>
        </div>
      </div>

      <div id="debug">Loading...</div>
    </div>

    <div id="debugPane">
      <video id="camVideo" autoplay playsinline muted></video>
      <canvas id="camCanvas"></canvas>

      <div id="dbgFace"></div>
      <div id="dbgCentered"></div>
      <div id="dbgConf"></div>
    </div>

  </div>

  <script type="module">
    import {
      FaceDetector,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

    /******** CONFIG ********/
    const APPS_SCRIPT_URL = "https://script.google.com/a/macros/ntucfirstcampus.com/s/AKfycbz9G37Ri9zC81LNkGL0Mt1v609kIN-zqQCtpm2yhVFnH7uz3KDahVWaGrUt1aW781z8/exec";

    /******** URL PARAMS ********/
    const params = new URLSearchParams(location.search);
    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YOUTUBE_ID = params.get("yt") || "";
    const DEBUG = params.get("debug") === "1";

    const SESSION_ID = "sess_" + Date.now();

    let player;
    let started = false;
    let sessionEnded = false;
    let eventIndex = 0;

    let faceDetector;
    let cameraReady = false;

    let faceState = {
      face_detected: 0,
      face_centered: 0,
      detection_confidence: 0,
      engaged: 0
    };

    const debug = document.getElementById("debug");
    const startBtn = document.getElementById("startBtn");
    const overlay = document.getElementById("overlay");
    const debugPane = document.getElementById("debugPane");

    const camVideo = document.getElementById("camVideo");
    const camCanvas = document.getElementById("camCanvas");
    const ctx = camCanvas.getContext("2d");

    if (DEBUG) debugPane.style.display = "block";

    init();

    async function init() {
      debug.textContent = "Initializing MediaPipe...";
      const resolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
      );

      faceDetector = await FaceDetector.createFromOptions(resolver, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite"
        },
        runningMode: "VIDEO",
        minDetectionConfidence: 0.5
      });

      initYouTube();

      debug.textContent = "Ready. Tap Start.";
    }

    function initYouTube() {
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);

      window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player("player", {
          videoId: YOUTUBE_ID,
          playerVars: { controls: 0, playsinline: 1 },
          events: {
            onReady: () => debug.textContent = "Ready. Tap Start.",
            onStateChange: (e) => {
              if (e.data === YT.PlayerState.ENDED) endSession("SESSION_COMPLETE");
            }
          }
        });
      };
    }

    startBtn.onclick = startSession;

    async function startSession() {
      overlay.style.display = "none";

      await startCamera();

      player.playVideo();
      started = true;

      startDetection();
      logEvent("AUTO_START");

      setInterval(() => {
        if (!sessionEnded) logEvent("AUTO_SAMPLE");
      }, 1000);
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
      });

      camVideo.srcObject = stream;
      await camVideo.play();

      cameraReady = true;
    }

    function startDetection() {
      function loop() {
        if (!cameraReady) return requestAnimationFrame(loop);

        const result = faceDetector.detectForVideo(camVideo, performance.now());
        const faces = result.detections || [];

        if (faces.length === 0) {
          faceState = {
            face_detected: 0,
            face_centered: 0,
            detection_confidence: 0,
            engaged: 0
          };
        } else {
          const box = faces[0].boundingBox;
          const score = faces[0].categories[0].score;

          const cx = box.originX + box.width / 2;
          const cy = box.originY + box.height / 2;

          const w = camVideo.videoWidth;
          const h = camVideo.videoHeight;

          const centered =
            cx > w * 0.15 &&
            cx < w * 0.85 &&
            cy > h * 0.15 &&
            cy < h * 0.85;

          faceState = {
            face_detected: 1,
            face_centered: centered ? 1 : 0,
            detection_confidence: Number(score.toFixed(3)),
            engaged: centered ? 1 : 0
          };

          if (DEBUG) {
            ctx.clearRect(0, 0, camCanvas.width, camCanvas.height);
            ctx.strokeStyle = centered ? "lime" : "red";
            ctx.strokeRect(box.originX, box.originY, box.width, box.height);
          }
        }

        updateDebug();
        requestAnimationFrame(loop);
      }

      loop();
    }

    function updateDebug() {
      debug.textContent =
        `PID: ${PID}\nVID: ${VID}\n` +
        `Face: ${faceState.face_detected}\n` +
        `Centered: ${faceState.face_centered}\n` +
        `Confidence: ${faceState.detection_confidence}`;
    }

    async function logEvent(key) {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
          session_id: SESSION_ID,
          pid: PID,
          vid: VID,
          youtubeId: YOUTUBE_ID,
          eventIndex: eventIndex++,
          videoTime: player.getCurrentTime(),
          engaged: faceState.engaged,
          key: key,
          face_detected: faceState.face_detected,
          face_centered: faceState.face_centered,
          detection_confidence: faceState.detection_confidence
        })
      });
    }

    function endSession(key) {
      if (sessionEnded) return;
      sessionEnded = true;
      logEvent(key);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Escape") endSession("SESSION_ABORT");
    });

  </script>
</body>
</html>
