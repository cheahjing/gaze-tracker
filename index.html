<!DOCTYPE html>
<html>
<head>
  <!--
  AUTO LOOKING LOGGER — STATIC HOSTED VERSION

  This page:
  1. Reads pid, vid, yt, and debug from the URL
  2. Requests front camera access
  3. Plays the given YouTube video
  4. Runs simple face detection with tracking.js
  5. Logs one row per second to Apps Script
  6. Logs AUTO_START, AUTO_SAMPLE, SESSION_ABORT, SESSION_COMPLETE

  This is a browser-side "looking at screen" proxy, not lab-grade eye tracking.
  -->

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: system-ui;
      overflow: hidden;
    }

    #layout {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #videoPane {
      flex: 1;
      position: relative;
      background: black;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #debugPane {
      width: 320px;
      background: #111;
      border-left: 1px solid #333;
      padding: 12px;
      box-sizing: border-box;
      display: none;
      overflow-y: auto;
    }

    #camWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      overflow: hidden;
      margin-bottom: 12px;
    }

    #camVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: block;
      transform: scaleX(-1);
    }

    #camCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform: scaleX(-1);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      z-index: 999;
      text-align: center;
      padding: 20px;
    }

    button {
      font-size: 18px;
      padding: 10px 18px;
      margin-top: 10px;
    }

    #debug {
      position: absolute;
      left: 10px;
      top: 10px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      white-space: pre-wrap;
      z-index: 900;
    }

    .kv {
      margin: 4px 0;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/data/face-min.js"></script>
</head>

<body>
  <div id="layout">
    <div id="videoPane">
      <div id="player"></div>

      <div id="overlay">
        <div>
          <h2>Auto Looking Logger</h2>
          <p>
            Tap Start to begin video playback and automatic sampling.<br>
            Press Escape to abort the session.
          </p>
          <button id="startBtn">Start</button>
        </div>
      </div>

      <div id="debug">Loading...</div>
    </div>

    <div id="debugPane">
      <h3 style="margin-top:0;">Debug Camera View</h3>
      <div id="camWrap">
        <video id="camVideo" autoplay playsinline muted></video>
        <canvas id="camCanvas"></canvas>
      </div>

      <div class="kv" id="dbgCam">CAMERA: —</div>
      <div class="kv" id="dbgFace">FACE: —</div>
      <div class="kv" id="dbgCentered">CENTERED: —</div>
      <div class="kv" id="dbgCount">FACE COUNT: —</div>
      <div class="kv" id="dbgSize">FACE SIZE: —</div>
      <div class="kv" id="dbgState">AUTO STATE: —</div>
      <div class="kv" id="dbgTime">VIDEO TIME: —</div>
    </div>
  </div>

  <script>
    /************************************************************
    CONFIG
    ************************************************************/
    const APPS_SCRIPT_URL = "https://script.google.com/a/macros/ntucfirstcampus.com/s/AKfycbz9G37Ri9zC81LNkGL0Mt1v609kIN-zqQCtpm2yhVFnH7uz3KDahVWaGrUt1aW781z8/exec";

    /************************************************************
    URL PARAMETERS

    Required:
    - pid
    - vid
    - yt

    Optional:
    - debug=1
    ************************************************************/
    const params = new URLSearchParams(location.search);

    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YOUTUBE_ID = params.get("yt") || "";
    const DEBUG = params.get("debug") === "1";

    /************************************************************
    SESSION / STATE
    ************************************************************/
    const SESSION_ID =
      "auto_sess_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    let player = null;
    let started = false;
    let sessionEnded = false;
    let eventIndex = 0;

    let sampleTimer = null;
    let trackerStarted = false;
    let cameraReady = false;

    let faceState = {
      face_detected: 0,
      face_centered: 0,
      face_count: 0,
      face_width: 0,
      face_height: 0,
      engaged: 0
    };

    const debug = document.getElementById("debug");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const debugPane = document.getElementById("debugPane");
    const camVideo = document.getElementById("camVideo");
    const camCanvas = document.getElementById("camCanvas");
    const camCtx = camCanvas.getContext("2d");

    const dbgCam = document.getElementById("dbgCam");
    const dbgFace = document.getElementById("dbgFace");
    const dbgCentered = document.getElementById("dbgCentered");
    const dbgCount = document.getElementById("dbgCount");
    const dbgSize = document.getElementById("dbgSize");
    const dbgState = document.getElementById("dbgState");
    const dbgTime = document.getElementById("dbgTime");

    if (DEBUG) debugPane.style.display = "block";

    init();

    /************************************************************
    INIT
    ************************************************************/
    function init() {
      if (!YOUTUBE_ID) {
        debug.textContent =
          `❌ Missing YouTube ID in URL\n` +
          `Expected ?pid=P001&vid=V01&yt=YOUTUBE_ID`;
        return;
      }

      initPlayer(YOUTUBE_ID);

      debug.textContent =
        `Ready\n` +
        `Participant: ${PID}\n` +
        `Video: ${VID}\n` +
        `YouTube ID: ${YOUTUBE_ID}\n` +
        `Session: ${SESSION_ID}\n` +
        `Debug: ${DEBUG ? "ON" : "OFF"}\n` +
        `Tap Start`;
    }

    /************************************************************
    CREATE YOUTUBE PLAYER
    ************************************************************/
    function initPlayer(youtubeId) {
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);

      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player("player", {
          videoId: youtubeId,
          playerVars: {
            controls: 0,
            rel: 0,
            modestbranding: 1,
            playsinline: 1
          },
          events: {
            onStateChange: onPlayerStateChange
          }
        });
      };
    }

    /************************************************************
    START CAMERA
    ************************************************************/
    async function startCamera() {
      if (cameraReady) return;

      dbgCam.textContent = "CAMERA: requesting permission...";

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      camVideo.srcObject = stream;
      await camVideo.play();
      await waitForCameraReady();

      cameraReady = true;
      dbgCam.textContent = `CAMERA: ready (${camVideo.videoWidth}×${camVideo.videoHeight})`;
    }

    /************************************************************
    WAIT FOR CAMERA READY
    ************************************************************/
    function waitForCameraReady() {
      return new Promise((resolve, reject) => {
        const timeoutMs = 5000;
        const start = Date.now();

        function check() {
          if (camVideo.videoWidth > 0 && camVideo.videoHeight > 0) {
            resizeDebugCanvas();
            resolve();
            return;
          }

          if (Date.now() - start > timeoutMs) {
            reject(new Error("Camera video did not become ready in time."));
            return;
          }

          requestAnimationFrame(check);
        }

        check();
      });
    }

    function resizeDebugCanvas() {
      if (!DEBUG) return;
      camCanvas.width = camVideo.clientWidth || 320;
      camCanvas.height = camVideo.clientHeight || 240;
    }

    window.addEventListener("resize", resizeDebugCanvas);

    /************************************************************
    START SESSION
    ************************************************************/
    startBtn.addEventListener("click", startSession);

    async function startSession() {
      if (!player || started) return;

      try {
        overlay.style.display = "none";

        await startCamera();

        player.seekTo(0, true);
        player.playVideo();

        started = true;
        sessionEnded = false;

        startTracking();
        await logAutoEvent("AUTO_START");

        sampleTimer = setInterval(() => {
          if (!started || sessionEnded) return;
          logAutoEvent("AUTO_SAMPLE");
        }, 1000);

      } catch (err) {
        debug.textContent =
          `❌ Could not start session\n` +
          `Participant: ${PID}\n` +
          `Video: ${VID}\n` +
          `Camera error: ${err.name ? err.name + ": " : ""}${err.message || String(err)}`;

        overlay.style.display = "flex";
      }
    }

    /************************************************************
    PLAYER STATE CHANGE
    ************************************************************/
    function onPlayerStateChange(event) {
      if (started && !sessionEnded && event.data === YT.PlayerState.ENDED) {
        sessionEnded = true;
        clearInterval(sampleTimer);
        logAutoEvent("SESSION_COMPLETE");
      }
    }

    /************************************************************
    TERMINATE SESSION
    ************************************************************/
    function terminateSession() {
      if (!started || sessionEnded) return;

      sessionEnded = true;
      clearInterval(sampleTimer);

      if (player && player.pauseVideo) player.pauseVideo();
      logAutoEvent("SESSION_ABORT");
    }

    /************************************************************
    LOG ONE AUTO EVENT

    Uses a simple form-style POST to Apps Script.
    ************************************************************/
    async function logAutoEvent(key) {
      const t = player && player.getCurrentTime ? player.getCurrentTime() : 0;

      updateDebug(t, key);

      const body = new URLSearchParams({
        session_id: SESSION_ID,
        pid: PID,
        vid: VID,
        youtubeId: YOUTUBE_ID,
        eventIndex: String(eventIndex++),
        videoTime: String(Number(t.toFixed(3))),
        engaged: String(faceState.engaged),
        key: key,
        face_detected: String(faceState.face_detected),
        face_centered: String(faceState.face_centered),
        face_count: String(faceState.face_count),
        face_width: String(faceState.face_width),
        face_height: String(faceState.face_height)
      });

      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
        },
        body: body.toString()
      });
    }

    /************************************************************
    UPDATE DEBUG PANELS
    ************************************************************/
    function updateDebug(videoTime, key) {
      debug.textContent =
        `Participant: ${PID}\n` +
        `Video: ${VID}\n` +
        `YouTube ID: ${YOUTUBE_ID}\n` +
        `Session: ${SESSION_ID}\n` +
        `video_time: ${videoTime.toFixed(2)}\n` +
        `engaged: ${faceState.engaged}\n` +
        `key: ${key}\n` +
        `face_detected: ${faceState.face_detected}\n` +
        `face_centered: ${faceState.face_centered}`;

      if (DEBUG) {
        dbgFace.textContent = `FACE: ${faceState.face_detected ? "YES" : "NO"}`;
        dbgCentered.textContent = `CENTERED: ${faceState.face_centered ? "YES" : "NO"}`;
        dbgCount.textContent = `FACE COUNT: ${faceState.face_count}`;
        dbgSize.textContent = `FACE SIZE: ${faceState.face_width} × ${faceState.face_height}`;
        dbgState.textContent = `AUTO STATE: ${faceState.engaged}`;
        dbgTime.textContent = `VIDEO TIME: ${videoTime.toFixed(2)}s`;
      }
    }

    /************************************************************
    FACE DETECTION WITH tracking.js
    ************************************************************/
    function startTracking() {
      if (trackerStarted) return;
      trackerStarted = true;

      const tracker = new tracking.ObjectTracker("face");
      tracker.setInitialScale(4);
      tracker.setStepSize(2);
      tracker.setEdgesDensity(0.1);

      tracking.track(camVideo, tracker, { camera: false });

      tracker.on("track", function(event) {
        const faces = event.data || [];

        if (DEBUG) {
          resizeDebugCanvas();
          camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
        }

        if (faces.length === 0) {
          faceState = {
            face_detected: 0,
            face_centered: 0,
            face_count: 0,
            face_width: 0,
            face_height: 0,
            engaged: 0
          };
          return;
        }

        const face = faces[0];
        const vidW = camVideo.videoWidth || camVideo.clientWidth;
        const vidH = camVideo.videoHeight || camVideo.clientHeight;

        const faceCx = face.x + face.width / 2;
        const faceCy = face.y + face.height / 2;

        const margin = 0.15;
        const centered =
          faceCx > vidW * margin &&
          faceCx < vidW * (1 - margin) &&
          faceCy > vidH * margin &&
          faceCy < vidH * (1 - margin);

        faceState = {
          face_detected: 1,
          face_centered: centered ? 1 : 0,
          face_count: faces.length,
          face_width: Math.round(face.width),
          face_height: Math.round(face.height),
          engaged: centered ? 1 : 0
        };

        if (DEBUG) {
          const scaleX = camCanvas.width / vidW;
          const scaleY = camCanvas.height / vidH;

          camCtx.strokeStyle = centered ? "#00ff88" : "#ff3355";
          camCtx.lineWidth = 2;
          camCtx.strokeRect(
            face.x * scaleX,
            face.y * scaleY,
            face.width * scaleX,
            face.height * scaleY
          );
        }
      });
    }

    /************************************************************
    KEYBOARD LISTENER
    ************************************************************/
    document.addEventListener("keydown", (e) => {
      if (e.code === "Escape") {
        e.preventDefault();
        terminateSession();
      }
    });
  </script>
</body>
</html>
